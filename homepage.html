<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sistem Informasi Kepegawaian</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden h-screen flex">

    <aside id="sidebar" class="bg-slate-900 text-slate-300 w-64 h-full fixed md:relative z-30 transition-all duration-300 transform -translate-x-full md:translate-x-0 flex flex-col justify-between shadow-2xl">
        <div>
            <div class="p-5 flex items-center justify-between border-b border-slate-800 bg-slate-950">
                <div class="flex items-center space-x-3">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-500/30">
                        <i class="fa-solid fa-users-gear text-lg"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-white tracking-wide text-sm">SIMPEG Master</h1>
                        <p class="text-xs text-slate-500">v1.0-Operator</p>
                    </div>
                </div>
                <button id="close-sidebar" class="md:hidden text-slate-400 hover:text-white transition">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <nav class="p-4 space-y-1.5 flex-1 overflow-y-auto">
                <a href="#" onclick="window.loadPage('welcome')" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-slate-800 text-white font-medium transition shadow-sm">
                    <i class="fa-solid fa-chart-pie text-indigo-400 w-5"></i>
                    <span class="text-sm">Dashboard Utama</span>
                </a>

                <div class="space-y-1">
                    <button onclick="window.toggleDropdown('dropdown-pegawai', 'arrow-pegawai')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-slate-800/60 hover:text-white transition text-left group">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-folder-tree text-slate-400 group-hover:text-indigo-400 w-5 transition"></i>
                            <span class="text-sm font-medium">Manajemen Data</span>
                        </div>
                        <i id="arrow-pegawai" class="fa-solid fa-chevron-right text-xs text-slate-500 transition-transform duration-200"></i>
                    </button>
                    <div id="dropdown-pegawai" class="hidden pl-11 pr-2 py-1 space-y-1 bg-slate-950/40 rounded-xl">
                        <a href="#" onclick="window.loadPage('homepage/html/pegawai.html')" class="block py-2 px-3 text-xs rounded-lg hover:text-white hover:bg-slate-800 transition">Data Master Pegawai</a>
                    </div>
                </div>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-800 bg-slate-950/50">
            <div class="flex items-center space-x-3 mb-4 px-2">
                <div class="w-9 h-9 rounded-full bg-indigo-600/20 text-indigo-400 flex items-center justify-center font-bold text-sm border border-indigo-500/30">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <div class="overflow-hidden">
                    <p class="text-xs font-semibold text-white truncate" id="user-email">Memuat...</p>
                    <p class="text-[10px] text-slate-500">Operator Sistem</p>
                </div>
            </div>
            <button id="btn-logout" class="w-full flex items-center justify-center space-x-2 bg-red-600/10 hover:bg-red-600 border border-red-500/20 hover:border-red-600 text-red-400 hover:text-white py-2.5 px-4 rounded-xl transition duration-200 text-sm font-medium shadow-sm">
                <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
                <span>Keluar Sistem</span>
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
        <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 z-10 shadow-xs">
            <div class="flex items-center space-x-4">
                <button id="toggle-sidebar" class="md:hidden p-2 rounded-xl text-slate-600 hover:bg-slate-100 transition">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
                <h2 id="page-title" class="text-lg font-bold text-slate-800 tracking-tight">Dashboard Utama</h2>
            </div>
            <div id="current-time" class="text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full hidden sm:block">
                Memuat Waktu...
            </div>
        </header>

        <main class="flex-1 w-full h-full bg-slate-50 relative">
            <div id="welcome-view" class="absolute inset-0 flex flex-col items-center justify-center p-8 z-10 bg-slate-50">
                <div class="max-w-md text-center">
                    <div class="w-20 h-20 bg-indigo-50 border border-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600 text-3xl mx-auto shadow-xl shadow-indigo-500/5 mb-6 animate-bounce">
                        <i class="fa-solid fa-hands-clapping"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-2">Selamat Datang di Portal SIMPEG</h3>
                    <p class="text-sm text-slate-500 leading-relaxed mb-6">Gunakan menu navigasi di bilah kiri (Sidebar) untuk mulai mengelola database Master Pegawai.</p>
                </div>
            </div>
            <iframe id="content-frame" class="w-full h-full border-none hidden relative z-20"></iframe>
        </main>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xs z-20 hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script> 
</body>
</html>
