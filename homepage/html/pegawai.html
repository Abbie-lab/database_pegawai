<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data Master Pegawai</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="bg-slate-50 p-6 custom-scrollbar overflow-y-auto min-h-screen">

    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 bg-white p-4 rounded-2xl shadow-xs border border-slate-200">
        <div class="relative w-full sm:w-80">
            <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="search-input" placeholder="Cari nama atau NIK/NIP..." class="w-full pl-10 pr-4 py-2 border border-slate-200 text-sm rounded-xl bg-slate-50 focus:bg-white focus:ring-3">
        </div>
        <button id="btn-tambah-pegawai" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl text-sm font-semibold transition flex items-center justify-center space-x-2 shadow-lg shadow-indigo-600/20">
            <i class="fa-solid fa-plus"></i>
            <span>Tambah Pegawai Baru</span>
        </button>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden">
        <div class="overflow-x-auto w-full">
            <table class="w-full text-left text-sm border-collapse">
                <thead class="bg-slate-50 text-slate-500 font-semibold border-b border-slate-200 text-xs tracking-wider uppercase">
                    <tr>
                        <th class="p-4 text-center w-12">No</th>
                        <th class="p-4">Informasi Pegawai</th>
                        <th class="p-4">Identitas Resmi</th>
                        <th class="p-4">Jabatan & Ruangan</th>
                        <th class="p-4">Kontak</th>
                        <th class="p-4 text-center w-32">Aksi</th>
                    </tr>
                </thead>
                <tbody id="pegawai-table-body" class="divide-y divide-slate-100 text-slate-700 font-medium">
                    <tr>
                        <td colspan="6" class="p-8 text-center text-slate-400">
                            <i class="fa-solid fa-spinner animate-spin text-2xl mb-2 text-indigo-500"></i>
                            <p class="text-xs">Sedang memuat data dari database Supabase...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="pegawai-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-5xl h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-scaleUp">
            <div class="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <div>
                    <h3 id="modal-title" class="text-base font-bold text-slate-900">Formulir Pegawai</h3>
                    <p class="text-xs text-slate-500">Silakan isi seluruh parameter kategori data pegawai secara valid.</p>
                </div>
                <button id="close-modal" class="text-slate-400 hover:text-slate-600 transition p-2 rounded-lg hover:bg-slate-200/50">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <div class="flex overflow-x-auto border-b border-slate-100 bg-slate-50/50 px-4 custom-scrollbar">
                <button onclick="switchTab('tab-pribadi')" id="btn-tab-pribadi" class="tab-btn px-4 py-3 border-b-2 border-indigo-600 text-indigo-600 font-bold text-xs whitespace-nowrap uppercase tracking-wider">1. Identitas Pribadi</button>
                <button onclick="switchTab('tab-kepegawaian')" id="btn-tab-kepegawaian" class="tab-btn px-4 py-3 border-b-2 border-transparent text-slate-500 font-semibold text-xs whitespace-nowrap uppercase tracking-wider hover:text-slate-800">2. Kepegawaian</button>
                <button onclick="switchTab('tab-keluarga')" id="btn-tab-keluarga" class="tab-btn px-4 py-3 border-b-2 border-transparent text-slate-500 font-semibold text-xs whitespace-nowrap uppercase tracking-wider hover:text-slate-800">3. Silsilah Keluarga</button>
                <button onclick="switchTab('tab-pendidikan')" id="btn-tab-pendidikan" class="tab-btn px-4 py-3 border-b-2 border-transparent text-slate-500 font-semibold text-xs whitespace-nowrap uppercase tracking-wider hover:text-slate-800">4. Pendidikan & Pelatihan</button>
                <button onclick="switchTab('tab-lisensi')" id="btn-tab-lisensi" class="tab-btn px-4 py-3 border-b-2 border-transparent text-slate-500 font-semibold text-xs whitespace-nowrap uppercase tracking-wider hover:text-slate-800">5. Sertifikasi & STR</button>
            </div>

            <form id="pegawai-form" class="flex-1 overflow-y-auto p-6 custom-scrollbar bg-white">
                <input type="hidden" id="id_peg"> <div id="tab-pribadi" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

                <div id="tab-kepegawaian" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>

                <div id="tab-keluarga" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>

                <div id="tab-pendidikan" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>

                <div id="tab-lisensi" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>
            </form>

            <div class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button type="button" id="btn-batal" class="px-5 py-2 border border-slate-200 hover:bg-slate-100 text-slate-600 text-sm font-semibold rounded-xl transition">Batal</button>
                <button type="button" id="btn-simpan" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-xl transition shadow-md shadow-indigo-600/10">Simpan Data</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../js/pegawai.js"></script>
</body>
</html>
